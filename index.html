  <script src="/_sdk/0179d719c431a79e.data_sdk.js" integrity="sha512-OsRvJkI5GkC3MJQcgotQYotpzrMSX415GiKKgvYdxQEEkzD/fdchShO2FMSy0PJr/tiINMXOk5Vl2zAgg6bUiA=="></script>
  <script>
    // Players database
    const PLAYERS = [
        {name:"یاشار احمدوند", username:"yashar_a", pass:"1001"},
        {name:"جواد شریفی", username:"javad_sh", pass:"1002"},
        {name:"محمد صالح حیدری", username:"saleh_h", pass:"1003"},
        {name:"علی صمدی", username:"ali_sa", pass:"1004"},
        {name:"آرتین حمزه زاده", username:"artin_h", pass:"1005"},
        {name:"آرتا زارعی", username:"arta_z", pass:"1006"},
        {name:"یاشار صالحی", username:"yashar_s", pass:"1007"},
        {name:"کیان میرزایی", username:"kian_m", pass:"1008"},
        {name:"مهدی خوش مرام", username:"mehdi_kh", pass:"1009"},
        {name:"امیرعلی شالی", username:"amirali_sh", pass:"1010"},
        {name:"کوروش عبدی", username:"kourosh_a", pass:"1011"},
        {name:"امیرمحمد بداغی", username:"amirmohammad_b", pass:"1012"},
        {name:"علیرضا کهوند", username:"alireza_k", pass:"1013"},
        {name:"مهدی کرمی", username:"mehdi_ka", pass:"1014"},
        {name:"سامیار احمدوند", username:"samiar_a", pass:"1015"},
        {name:"علی حسینی", username:"ali_ho", pass:"1016"},
        {name:"آبتین", username:"abtin", pass:"1017"},
        {name:"علی والیبالی", username:"ali_v", pass:"1018"}
    ];
    const ADMIN = {username:"MODIR", pass:"13963"};

    let currentUser = null;
    let isAdmin = false;
    let appData = {};

    // Default data
    const DEFAULT_DATA = {
        players_list: JSON.stringify(PLAYERS.map(p => p.name)),
        rules_text: "فحش دادن حین یا خارج بازی = 5 بازی اخراج.",
        league_text: "",
        feedback_desc: "نظرات خود را اینجا بنویسید.",
        poll_text: "سوال نظر سنجی در اینجا قرار میگیرد...",
        transfers_text: "لیست نقل و انتقالات...",
        teams: JSON.stringify([]),
        matches: JSON.stringify([]),
        player_stats: JSON.stringify({}),
        standings: JSON.stringify([])
    };

    // Data SDK handler
    const dataHandler = {
        onDataChanged(data) {
            // Build appData from key-value records
            appData = {};
            data.forEach(record => {
                appData[record.key] = record;
            });
            renderAll();
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    async function initApp() {
        const result = await window.dataSdk.init(dataHandler);
        if (!result.isOk) {
            document.getElementById('loading-overlay').textContent = 'خطا در بارگذاری!';
        }
    }

    function getData(key) {
        if (appData[key]) return appData[key].value;
        return DEFAULT_DATA[key] || "";
    }

    async function setData(key, value) {
        if (appData[key]) {
            const record = {...appData[key], value: value};
            return await window.dataSdk.update(record);
        } else {
            return await window.dataSdk.create({key: key, value: value});
        }
    }

    function renderAll() {
        renderPlayersGrid();
        renderRulesText();
        renderLeagueText();
        renderFeedbackDesc();
        renderPollText();
        renderTransfersText();
        renderTeams();
        renderMatches();
        renderStandings();
        if (isAdmin) renderAdminView();
        if (currentUser && !isAdmin) renderPlayerView();
    }

    // Tab navigation
    function openTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (btn) btn.classList.add('active');
        else document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active');
    }

    // Login
    function login() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if (u === ADMIN.username && p === ADMIN.pass) {
            isAdmin = true;
            currentUser = {name: "مدیر", username: ADMIN.username};
            showUserSection();
            return;
        }
        const player = PLAYERS.find(pl => pl.username === u && pl.pass === p);
        if (player) {
            currentUser = player;
            isAdmin = false;
            showUserSection();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function showUserSection() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('user-section').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('welcome-msg').textContent = `خوش آمدید، ${currentUser.name}!`;
        if (isAdmin) {
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('save-btn').style.display = 'block';
            enableAdminEditing();
            renderAdminView();
        } else {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            document.getElementById('save-btn').style.display = 'none';
            renderPlayerView();
        }
    }

    function logout() {
        currentUser = null;
        isAdmin = false;
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('user-section').style.display = 'none';
        document.getElementById('save-btn').style.display = 'none';
        disableAdminEditing();
    }

    // Players Grid (Home)
    function renderPlayersGrid() {
        const container = document.getElementById('players-grid');
        let players;
        try { players = JSON.parse(getData('players_list')); } catch(e) { players = PLAYERS.map(p=>p.name); }
        container.innerHTML = players.map(name => `<div class="grid-item">${name}</div>`).join('');
    }

    // Editable text sections
    function renderRulesText() { document.getElementById('rules-text').textContent = getData('rules_text'); }
    function renderLeagueText() { document.getElementById('league-text').textContent = getData('league_text'); }
    function renderFeedbackDesc() { document.getElementById('feedback-desc').textContent = getData('feedback_desc'); }
    function renderPollText() { document.getElementById('poll-text').textContent = getData('poll_text'); }
    function renderTransfersText() { document.getElementById('transfers-text').textContent = getData('transfers_text'); }

    // Teams
    function renderTeams() {
        const container = document.getElementById('teams-grid');
        let teams;
        try { teams = JSON.parse(getData('teams')); } catch(e) { teams = []; }
        if (teams.length === 0) {
            container.innerHTML = '<p style="color:#999;">هنوز تیمی اضافه نشده.</p>';
            return;
        }
        container.innerHTML = teams.map((team, i) => `
            <div class="team-card ${isAdmin ? 'admin-active' : ''}">
                <h4>${team.name}</h4>
                <ul class="team-player-list">
                    ${team.players.map((p, pi) => `<li>${p} <button class="remove-player-btn" onclick="removeTeamPlayer(${i},${pi})">✕</button></li>`).join('')}
                </ul>
                ${isAdmin ? `<div style="display:flex;gap:6px;margin-top:8px;"><input type="text" id="tp-${i}" placeholder="نام بازیکن" style="flex:1;background:#222;border:1px solid #555;color:#fff;padding:6px;border-radius:8px;font-family:'Vazirmatn',sans-serif;font-size:13px;"><button class="btn-small btn-green" onclick="addTeamPlayer(${i})">+</button></div>` : ''}
                ${isAdmin ? `<button class="btn-small btn-red" style="margin-top:8px;" onclick="removeTeam(${i})">حذف تیم</button>` : ''}
            </div>
        `).join('');
        updateMatchTeamSelects(teams);
    }

    function updateMatchTeamSelects(teams) {
        const s1 = document.getElementById('match-team1');
        const s2 = document.getElementById('match-team2');
        if (!s1 || !s2) return;
        const opts = teams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
        s1.innerHTML = opts;
        s2.innerHTML = opts;
    }

    // Matches
    function renderMatches() {
        const container = document.getElementById('matches-list');
        let matches;
        try { matches = JSON.parse(getData('matches')); } catch(e) { matches = []; }
        if (matches.length === 0) {
            container.innerHTML = '<p style="color:#999;">هنوز بازی‌ای ثبت نشده.</p>';
            return;
        }
        container.innerHTML = '<div class="matches-grid">' + matches.map((m, i) => `
            <div class="match-card ${m.played ? 'played' : 'upcoming'}">
                <div class="match-teams">
                    <span class="match-team-name">${m.team1}</span>
                    <span class="match-score">${m.played ? m.score1 + ' - ' + m.score2 : '- - -'}</span>
                    <span class="match-team-name">${m.team2}</span>
                </div>
                <div class="match-date">${m.date || ''}</div>
                <div class="match-status ${m.played ? 'played-label' : 'upcoming-label'}">${m.played ? 'انجام شده' : 'برگزار نشده'}</div>
                ${isAdmin ? `
                <div class="admin-match-controls visible" style="display:flex;">
                    <input type="number" id="ms1-${i}" value="${m.score1||0}" min="0" style="width:50px;">
                    <span style="color:#aaa;align-self:center;">-</span>
                    <input type="number" id="ms2-${i}" value="${m.score2||0}" min="0" style="width:50px;">
                    <button class="btn-small btn-green" onclick="saveMatchScore(${i})">ثبت</button>
                    <button class="btn-small btn-red" onclick="removeMatch(${i})">حذف</button>
                </div>` : ''}
            </div>
        `).join('') + '</div>';
    }

    // Standings
    function renderStandings() {
        const container = document.getElementById('standings-table');
        let teams, matches;
        try { teams = JSON.parse(getData('teams')); } catch(e) { teams = []; }
        try { matches = JSON.parse(getData('matches')); } catch(e) { matches = []; }
        if (teams.length === 0) { container.innerHTML = '<p style="color:#999;">تیمی وجود ندارد.</p>'; return; }

        const stats = {};
        teams.forEach(t => { stats[t.name] = {w:0,d:0,l:0,gf:0,ga:0,pts:0,played:0}; });
        matches.filter(m=>m.played).forEach(m => {
            if (!stats[m.team1] || !stats[m.team2]) return;
            const s1 = parseInt(m.score1)||0, s2 = parseInt(m.score2)||0;
            stats[m.team1].gf += s1; stats[m.team1].ga += s2; stats[m.team1].played++;
            stats[m.team2].gf += s2; stats[m.team2].ga += s1; stats[m.team2].played++;
            if (s1 > s2) { stats[m.team1].w++; stats[m.team1].pts+=3; stats[m.team2].l++; }
            else if (s2 > s1) { stats[m.team2].w++; stats[m.team2].pts+=3; stats[m.team1].l++; }
            else { stats[m.team1].d++; stats[m.team1].pts++; stats[m.team2].d++; stats[m.team2].pts++; }
        });

        const sorted = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts || (b[1].gf-b[1].ga) - (a[1].gf-a[1].ga));
        container.innerHTML = `<table><thead><tr><th>#</th><th>تیم</th><th>بازی</th><th>برد</th><th>مساوی</th><th>باخت</th><th>گل زده</th><th>گل خورده</th><th>امتیاز</th></tr></thead><tbody>${sorted.map(([name, s], i) => `<tr class="${i<3?'rank-'+(i+1):''}"><td>${i+1}</td><td>${name}</td><td>${s.played}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gf}</td><td>${s.ga}</td><td>${s.pts}</td></tr>`).join('')}</tbody></table>`;
    }

    // Admin
    function enableAdminEditing() {
        ['rules-text','league-text','feedback-desc','poll-text','transfers-text'].forEach(id => {
            const el = document.getElementById(id);
            el.contentEditable = 'true';
            el.classList.add('admin-editable');
        });
        document.getElementById('add-match-form').classList.add('visible');
    }

    function disableAdminEditing() {
        ['rules-text','league-text','feedback-desc','poll-text','transfers-text'].forEach(id => {
            const el = document.getElementById(id);
            el.contentEditable = 'false';
            el.classList.remove('admin-editable');
        });
        document.getElementById('add-match-form').classList.remove('visible');
    }

    function renderAdminView() {
        // Player stats table
        let stats;
        try { stats = JSON.parse(getData('player_stats')); } catch(e) { stats = {}; }
        let players;
        try { players = JSON.parse(getData('players_list')); } catch(e) { players = PLAYERS.map(p=>p.name); }

        const container = document.getElementById('admin-table-container');
        container.innerHTML = `<table><thead><tr><th>بازیکن</th><th>گل</th><th>اسیست</th><th>بازی</th></tr></thead><tbody>${players.map(p => {
            const s = stats[p] || {goals:0,assists:0,games:0};
            return `<tr><td>${p}</td><td contenteditable="true" class="stat-cell" data-player="${p}" data-field="goals">${s.goals}</td><td contenteditable="true" class="stat-cell" data-player="${p}" data-field="assists">${s.assists}</td><td contenteditable="true" class="stat-cell" data-player="${p}" data-field="games">${s.games}</td></tr>`;
        }).join('')}</tbody></table>`;

        // Admin players list
        const listContainer = document.getElementById('admin-players-list');
        listContainer.innerHTML = players.map((p, i) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #333;"><span>${p}</span><button class="btn-small btn-red" onclick="removePlayerFromList(${i})">✕</button></div>`).join('');
    }

    function renderPlayerView() {
        let stats;
        try { stats = JSON.parse(getData('player_stats')); } catch(e) { stats = {}; }
        let players;
        try { players = JSON.parse(getData('players_list')); } catch(e) { players = PLAYERS.map(p=>p.name); }

        const sorted = players.map(p => ({name:p, ...(stats[p]||{goals:0,assists:0,games:0})})).sort((a,b) => b.goals - a.goals);
        const container = document.getElementById('ranking-table-container');
        container.innerHTML = `<table><thead><tr><th>#</th><th>بازیکن</th><th>گل</th><th>اسیست</th><th>بازی</th></tr></thead><tbody>${sorted.map((p, i) => `<tr class="${i<3?'rank-'+(i+1):''}"><td>${i+1}</td><td>${p.name}</td><td>${p.goals}</td><td>${p.assists}</td><td>${p.games}</td></tr>`).join('')}</tbody></table>`;
    }

    // Admin actions
    async function addPlayerToList() {
        const input = document.getElementById('new-player-name');
        const name = input.value.trim();
        if (!name) return;
        let players;
        try { players = JSON.parse(getData('players_list')); } catch(e) { players = PLAYERS.map(p=>p.name); }
        players.push(name);
        await setData('players_list', JSON.stringify(players));
        input.value = '';
        showNotif();
    }

    async function removePlayerFromList(index) {
        let players;
        try { players = JSON.parse(getData('players_list')); } catch(e) { players = []; }
        players.splice(index, 1);
        await setData('players_list', JSON.stringify(players));
        showNotif();
    }

    async function addMatch() {
        const team1 = document.getElementById('match-team1').value;
        const team2 = document.getElementById('match-team2').value;
        const date = document.getElementById('match-date').value.trim();
        if (!team1 || !team2 || team1 === team2) return;
        let matches;
        try { matches = JSON.parse(getData('matches')); } catch(e) { matches = []; }
        matches.push({team1, team2, date, played: false, score1: 0, score2: 0});
        await setData('matches', JSON.stringify(matches));
        document.getElementById('match-date').value = '';
        showNotif();
    }

    async function saveMatchScore(index) {
        let matches;
        try { matches = JSON.parse(getData('matches')); } catch(e) { matches = []; }
        matches[index].score1 = parseInt(document.getElementById(`ms1-${index}`).value) || 0;
        matches[index].score2 = parseInt(document.getElementById(`ms2-${index}`).value) || 0;
        matches[index].played = true;
        await setData('matches', JSON.stringify(matches));
        showNotif();
    }

    async function removeMatch(index) {
        let matches;
        try { matches = JSON.parse(getData('matches')); } catch(e) { matches = []; }
        matches.splice(index, 1);
        await setData('matches', JSON.stringify(matches));
        showNotif();
    }

    async function addTeamPlayer(teamIndex) {
        const input = document.getElementById(`tp-${teamIndex}`);
        const name = input.value.trim();
        if (!name) return;
        let teams;
        try { teams = JSON.parse(getData('teams')); } catch(e) { teams = []; }
        teams[teamIndex].players.push(name);
        await setData('teams', JSON.stringify(teams));
        input.value = '';
        showNotif();
    }

    async function removeTeamPlayer(teamIndex, playerIndex) {
        let teams;
        try { teams = JSON.parse(getData('teams')); } catch(e) { teams = []; }
        teams[teamIndex].players.splice(playerIndex, 1);
        await setData('teams', JSON.stringify(teams));
        showNotif();
    }

    async function removeTeam(teamIndex) {
        let teams;
        try { teams = JSON.parse(getData('teams')); } catch(e) { teams = []; }
        teams.splice(teamIndex, 1);
        await setData('teams', JSON.stringify(teams));
        showNotif();
    }

    // Save all admin changes (text sections + stats)
    async function saveAdminChanges() {
        document.getElementById('save-btn').disabled = true;
        document.getElementById('save-btn').textContent = '⏳ در حال ذخیره...';

        // Save text sections
        await setData('rules_text', document.getElementById('rules-text').innerText);
        await setData('league_text', document.getElementById('league-text').innerText);
        await setData('feedback_desc', document.getElementById('feedback-desc').innerText);
        await setData('poll_text', document.getElementById('poll-text').innerText);
        await setData('transfers_text', document.getElementById('transfers-text').innerText);

        // Save player stats from table
        const cells = document.querySelectorAll('.stat-cell');
        let stats;
        try { stats = JSON.parse(getData('player_stats')); } catch(e) { stats = {}; }
        cells.forEach(cell => {
            const player = cell.dataset.player;
            const field = cell.dataset.field;
            if (!stats[player]) stats[player] = {goals:0, assists:0, games:0};
            stats[player][field] = parseInt(cell.textContent) || 0;
        });
        await setData('player_stats', JSON.stringify(stats));

        document.getElementById('save-btn').disabled = false;
        document.getElementById('save-btn').textContent = '💾 ذخیره تغییرات';
        showNotif();
    }

    function showNotif() {
        const n = document.getElementById('notif');
        n.style.display = 'block';
        setTimeout(() => { n.style.display = 'none'; }, 2500);
    }

    // Init
    initApp();
    </script>
